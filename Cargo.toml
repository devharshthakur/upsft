[package]
name = "upsft"
version = "0.0.1"
edition = "2024"

[lints.rust]
dead_code = "allow"
unused_variables = "allow"

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
cliclack = "0.5.4"
serde = { version = "1.0.228", features = ["derive"] }
thiserror = "2.0.18"
toml = { version = "1.1.2", features = ["debug"] }
tracing = { version = "0.1.44", features = ["log"] }
